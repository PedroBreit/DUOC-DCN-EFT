spring.application.name=cursos-service

# H2 exclusivo para pruebas
spring.datasource.url=jdbc:h2:mem:cursosdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA para pruebas
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Evita exponer consola H2 durante las pruebas
spring.h2.console.enabled=false

# Valores requeridos por la configuración S3
aws.region=us-east-1
aws.s3.bucket=duoc-plataforma-cursos